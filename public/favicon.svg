<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1714" />
      <stop offset="100%" stop-color="#040806" />
    </linearGradient>

    <!-- Ring/Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="50%" stop-color="#059669" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <!-- Leaf/Needle Gradient -->
    <linearGradient id="leafGrad1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <linearGradient id="leafGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#047857" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Glow -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#10b981" stroke-width="8" opacity="0.15" filter="url(#glow)" />

  <!-- Main Background -->
  <circle cx="256" cy="256" r="210" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="14" />

  <!-- Compass Ring Marks -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="8 12" opacity="0.4" />

  <!-- Compass Ordinal Ticks (N, S, E, W markers) -->
  <line x1="256" y1="66" x2="256" y2="78" stroke="#10b981" stroke-width="4" stroke-linecap="round" />
  <line x1="256" y1="434" x2="256" y2="446" stroke="#10b981" stroke-width="4" stroke-linecap="round" opacity="0.5" />
  <line x1="66" y1="256" x2="78" y2="256" stroke="#10b981" stroke-width="4" stroke-linecap="round" opacity="0.5" />
  <line x1="434" y1="256" x2="446" y2="256" stroke="#10b981" stroke-width="4" stroke-linecap="round" opacity="0.5" />

  <!-- Compass / Sprout Centerpiece -->
  <g transform="translate(146, 136) scale(10)">
    <!-- stem -->
    <path d="M10 20v-5a4 4 0 0 1 4-4h1" stroke="url(#leafGrad1)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <!-- Right Leaf -->
    <path d="M12 11c0-4.8 3.2-7 10-7 0 4.8-3.2 7-10 7Z" fill="url(#leafGrad1)" stroke="#0f1714" stroke-width="0.5" stroke-linejoin="round" />
    
    <!-- Left Leaf -->
    <path d="M10 15c0-3-1.5-5.5-4-7.5-6.8 0-10 2.2-10 7 6.8 0 10-2.2 10-7Z" fill="url(#leafGrad2)" stroke="#0f1714" stroke-width="0.5" stroke-linejoin="round" />
    
    <!-- Soil Base Line -->
    <path d="M7 20h10" stroke="#10b981" stroke-width="1.8" stroke-linecap="round" />
  </g>

  <!-- Glowing Center Pivot Pin -->
  <circle cx="256" cy="256" r="8" fill="#ffffff" filter="url(#glow)" />
</svg>